<!DOCTYPE html>
<html>
<head>
    <title>Edit Current Study</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="admin-form">
        <h1>Edit Current Study</h1>
        <form method="POST" enctype="multipart/form-data">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" value="{{ study.title if study else '' }}" required>
            
            <label for="description">Description:</label>
            <textarea id="description" name="description" required>{{ study.description if study else '' }}</textarea>
            
            <label for="image">Image:</label>
            <input type="file" id="image" name="image">
            {% if study and study.image %}
            <p>Current image: {{ study.image }}</p>
            {% endif %}
            
            <button type="submit">Save Changes</button>
        </form>
        <a href="{{ url_for('index') }}">Back to Home</a>
    </div>
</body>
</html>
