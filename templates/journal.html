<!DOCTYPE html>
<html>
<head>
    <title>Amwaj al-Fikr - Philosophy Club</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .journal-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .journal-post {
            border: 1px solid #000;
            padding: 25px;
            margin-bottom: 30px;
            background: #f4f1ea;
            transition: all 0.3s ease;
            color: inherit; /* Inherit text color */
            text-decoration: none; /* Remove underline */
            display: block; /* Maintain block layout */
        }
        .journal-post:hover {
            transform: translateY(-3px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            text-decoration: none; /* Ensure no underline on hover */
        }
        .pinned-post {
            border: 2px solid #d4af37;
        }
        .post-category {
            display: inline-block;
            padding: 3px 8px;
            background: #2c2c2c;
            color: white;
            font-size: 0.8em;
            margin-left: 10px;
        }
        .journal-post h2 {
            margin-top: 0;
            border-bottom: 1px solid #000;
            padding-bottom: 10px;
            color: inherit; /* Inherit text color */
        }
        .journal-post-link {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
    <div class="back-button-container">
        <a href="{{ url_for('index') }}" class="back-button">← Back to Home</a>
    </div>
    
    <div class="journal-container">
        <h1>Amwaj al-Fikr</h1>
        <p>Exploring philosophy through literature and art</p>
        
        {% for post in posts %}
        <a href="{{ url_for('journal_post', post_id=post.id) }}" class="journal-post-link">
            <div class="journal-post {% if post.is_pinned %}pinned-post{% endif %}">
                <h2>{{ post.title }} <span class="post-category">{{ post.category|title }}</span></h2>
                <div class="post-meta">
                    Published on {{ post.publish_date.strftime('%B %d, %Y') }}
                    {% if post.is_pinned %}(Pinned){% endif %}
                </div>
                <p>{{ post.description }}</p>
            </div>
        </a>
        {% endfor %}
    </div>
</body>
</html>
