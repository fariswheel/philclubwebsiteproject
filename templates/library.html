<!DOCTYPE html>
<html>
<head>
  <title>Philosophy Library</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .library-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .search-sort {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 2rem;
    }
    .book-card {
      border: 1px solid #e0e0e0;
      padding: 1.5rem;
      transition: transform 0.3s ease;
    }
    .book-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .book-cover {
      height: 200px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .book-actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="back-button-container">
      <a href="{{ url_for('index') }}" class="back-button">← Back to home</a>
  </div>
  <div class="library-container">
    <h1>Philosophy's Reading List</h1>
    
    <div class="search-sort">
      <input type="text" id="search" placeholder="Search books..." class="search-input">
      <select id="sort" class="sort-select">
        <option value="title">Sort by Title</option>
        <option value="author">Sort by Author</option>
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
      </select>
      <select id="filter" class="filter-select">
        <option value="all">All Categories</option>
        <option value="epistemology">Epistemology</option>
        <option value="ethics">Ethics</option>
        <option value="metaphysics">Metaphysics</option>
      </select>
    </div>
    
    <div class="book-grid" id="book-container">
      {% for book in books %}
      <div class="book-card" data-category="{{ book.category }}" data-title="{{ book.title|lower }}" data-author="{{ book.author|lower }}">
        <div class="book-cover">
          {% if book.cover_image %}
            <img src="{{ url_for('static', filename='library/covers/' + book.cover_image) }}" alt="{{ book.title }}" style="max-height: 100%">
          {% else %}
            <span>{{ book.title|truncate(30, true) }}</span>
          {% endif %}
        </div>
        <h3>{{ book.title }}</h3>
        <p class="author">{{ book.author }}</p>
        <p class="description">{{ book.description|truncate(100) }}</p>
        <div class="book-actions">
          <a href="{{ url_for('static', filename='library/pdfs/' + book.file_path) }}" class="btn" target="_blank">Read</a>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const searchInput = document.getElementById('search');
      const sortSelect = document.getElementById('sort');
      const filterSelect = document.getElementById('filter');
      const bookContainer = document.getElementById('book-container');
      const books = Array.from(document.querySelectorAll('.book-card'));
      
      function updateBooks() {
        const searchTerm = searchInput.value.toLowerCase();
        const filterValue = filterSelect.value;
        const sortValue = sortSelect.value;
        
        // Filter
        let filtered = books.filter(book => {
          const matchesSearch = book.dataset.title.includes(searchTerm) || 
                               book.dataset.author.includes(searchTerm);
          const matchesFilter = filterValue === 'all' || 
                               book.dataset.category === filterValue;
          return matchesSearch && matchesFilter;
        });
        
        // Sort
        filtered.sort((a, b) => {
          if (sortValue === 'title') {
            return a.dataset.title.localeCompare(b.dataset.title);
          } else if (sortValue === 'author') {
            return a.dataset.author.localeCompare(b.dataset.author);
          } else if (sortValue === 'newest') {
            return new Date(b.dataset.date) - new Date(a.dataset.date);
          } else {
            return new Date(a.dataset.date) - new Date(b.dataset.date);
          }
        });
        
        // Re-append
        filtered.forEach(book => bookContainer.appendChild(book));
      }
      
      searchInput.addEventListener('input', updateBooks);
      sortSelect.addEventListener('change', updateBooks);
      filterSelect.addEventListener('change', updateBooks);
    });
  </script>
</body>
</html>
